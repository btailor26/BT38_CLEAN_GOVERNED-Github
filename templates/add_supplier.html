{% extends "base.html" %}

{% block title %}Add Supplier - Inventory Management{% endblock %}

{% block content %}
<div class="mb-4">
    <h2><i data-feather="plus"></i> Add New Supplier</h2>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="name" class="form-label">Supplier Name *</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="contact_person" class="form-label">Contact Person</label>
                    <input type="text" class="form-control" id="contact_person" name="contact_person">
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email">
                    <small class="text-muted">For reorder notifications</small>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="tel" class="form-control" id="phone" name="phone">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="whatsapp_number" class="form-label">WhatsApp Number</label>
                    <input type="tel" class="form-control" id="whatsapp_number" name="whatsapp_number" placeholder="+44...">
                    <small class="text-muted">Include country code</small>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <textarea class="form-control" id="address" name="address" rows="2"></textarea>
            </div>
            
            <div class="mb-3">
                <label for="notes" class="form-label">Notes</label>
                <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
            </div>
            
            <div class="d-flex justify-content-between">
                <a href="{{ url_for('routes.suppliers') }}" class="btn btn-secondary">
                    <i data-feather="x"></i> Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    <i data-feather="save"></i> Save Supplier
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    feather.replace();
</script>
{% endblock %}
