{% extends "base.html" %}

{% block title %}Create Purchase Order - Inventory Management{% endblock %}

{% block content %}
<div class="mb-4">
    <h2><i data-feather="plus"></i> Create Purchase Order</h2>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" id="poForm">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="supplier_id" class="form-label">Supplier *</label>
                    <select class="form-select" id="supplier_id" name="supplier_id" required>
                        <option value="">Select Supplier</option>
                        {% for supplier in suppliers %}
                        <option value="{{ supplier.id }}">{{ supplier.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="order_date" class="form-label">Order Date *</label>
                    <input type="date" class="form-control" id="order_date" name="order_date"
                           value="{{ today }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="expected_date" class="form-label">Expected Delivery</label>
                    <input type="date" class="form-control" id="expected_date" name="expected_date">
                </div>
            </div>

            <div class="mb-3">
                <label for="notes" class="form-label">Notes</label>
                <textarea class="form-control" id="notes" name="notes" rows="2"></textarea>
            </div>

            <hr>

            <h4 class="mb-3">Line Items</h4>
            <div id="lineItems">
                <div class="row mb-2 line-item">
                    <div class="col-md-3">
                        <label class="form-label">SKU *</label>
                        <input type="text" class="form-control" name="sku[]" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Product Name *</label>
                        <input type="text" class="form-control" name="product_name[]" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Quantity *</label>
                        <input type="number" class="form-control qty-input" name="quantity[]" min="1" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Unit Cost *</label>
                        <input type="number" class="form-control cost-input" name="unit_cost[]" step="0.01" min="0" required>
                    </div>
                    <div class="col-md-1 d-flex align-items-end">
                        <button type="button" class="btn btn-danger btn-sm remove-item" disabled>
                            <i data-feather="x"></i>
                        </button>
                    </div>
                </div>
            </div>

            <button type="button" class="btn btn-secondary btn-sm mb-3" id="addItem">
                <i data-feather="plus"></i> Add Item
            </button>

            <div class="row">
                <div class="col-md-8"></div>
                <div class="col-md-4">
                    <div class="card bg-light">
                        <div class="card-body">
                            <h5>Total: £<span id="totalAmount">0.00</span></h5>
                        </div>
                    </div>
                </div>
            </div>

            <hr>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('routes.purchase_orders') }}" class="btn btn-secondary">
                    <i data-feather="x"></i> Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    <i data-feather="save"></i> Create Purchase Order
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        feather.replace();

        const lineItemsContainer = document.getElementById('lineItems');
        const addItemBtn = document.getElementById('addItem');

        function updateTotal() {
            let total = 0;
            document.querySelectorAll('.line-item').forEach(item => {
                const qty = parseFloat(item.querySelector('.qty-input').value) || 0;
                const cost = parseFloat(item.querySelector('.cost-input').value) || 0;
                total += qty * cost;
            });
            document.getElementById('totalAmount').textContent = total.toFixed(2);
        }

        function updateRemoveButtons() {
            const items = document.querySelectorAll('.line-item');
            items.forEach((item, index) => {
                const removeBtn = item.querySelector('.remove-item');
                removeBtn.disabled = items.length === 1;
            });
        }

        addItemBtn.addEventListener('click', function() {
            const newItem = lineItemsContainer.firstElementChild.cloneNode(true);
            newItem.querySelectorAll('input').forEach(input => input.value = '');
            lineItemsContainer.appendChild(newItem);
            feather.replace();
            updateRemoveButtons();
        });

        lineItemsContainer.addEventListener('click', function(e) {
            if (e.target.closest('.remove-item')) {
                e.target.closest('.line-item').remove();
                updateTotal();
                updateRemoveButtons();
                feather.replace();
            }
        });

        lineItemsContainer.addEventListener('input', function(e) {
            if (e.target.classList.contains('qty-input') || e.target.classList.contains('cost-input')) {
                updateTotal();
            }
        });

        updateTotal();
        updateRemoveButtons();
    });
</script>
{% endblock %}
