{% extends "base.html" %}

{% block title %}Login - Inventory Management{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-header text-center">
                    <h4 class="mb-0">
                        <i data-feather="lock" class="me-2"></i>
                        Login
                    </h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                        <div class="mb-3">
                            <label for="username" class="form-label">Username or email</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i data-feather="user" style="width: 16px; height: 16px;"></i>
                                </span>
                                <input type="text" class="form-control" id="username" name="username"
                                       placeholder="Enter username or email" required>
                            </div>
                            <small class="text-muted">Use your username or the email address registered on your account.</small>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i data-feather="lock" style="width: 16px; height: 16px;"></i>
                                </span>
                                <input type="password" class="form-control" id="password" name="password"
                                       placeholder="Enter your password" required>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                <i data-feather="log-in" class="me-1" style="width: 16px; height: 16px;"></i>
                                Login
                            </button>
                        </div>
                    </form>

                    <div class="mt-3 text-center">
                        <small class="text-muted">
                            Enter the username or email address assigned to your BT38 account.
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Initialize Feather icons when page loads
document.addEventListener('DOMContentLoaded', function() {
    feather.replace();
});
</script>
{% endblock %}
