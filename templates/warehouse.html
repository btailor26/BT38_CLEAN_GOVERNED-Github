{% extends "base.html" %}

{% block title %}Master Stock
{% endblock %}

{% block content %}

<div class="bt38-enterprise-stock">

  <!-- HEADER -->

      <div class="bt38-subtitle">
        Warehouse Truth
      </div>

        One page to manage your inventory, listings, stock operations and warehouse actions.
      </p>
    </div>

    <div class="bt38-top-actions">
      
<button
    type="button"
    class="btn btn-primary"
    id="governedWarehouseSyncBtn"
>
    Sync Now
</button>

    </div>

  </div>

  <!-- OPERATIONAL TABS -->
  <div class="bt38-operational-tabs">

    <button class="active">Master Stock</button>

[TRUNCATED_FOR_BLOCK_REPLACEMENT]

    <div class="bt38-selected-pill">

      <option value="invoice">Invoice</option>
    </select>

  </div>

</div>


<script id="bt38WarehouseGovernedActionWiring">
(function(){
  if (window.bt38WarehouseGovernedActionWiringInstalled) return;
  window.bt38WarehouseGovernedActionWiringInstalled = true;

  async function postJson(url, payload){
    const resp = await fetch(url, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload || {})
    });
    let data = {};
    try { data = await resp.json(); } catch(e) {}
    if (!resp.ok || data.ok === false || data.success === false) {
      throw new Error(data.reason || data.message || data.error || ("Governed request failed: " + resp.status));
    }
    return data;
  }

  function rowFrom(el){
    return el && el.closest ? el.closest("tr") : null;
  }

  function setButtonState(btn, label){
    if (!btn) return;
    if (!btn.dataset.originalText) btn.dataset.originalText = btn.textContent.trim();
    btn.textContent = label;
  }

  function resetButton(btn){
    if (btn && btn.dataset.originalText) btn.textContent = btn.dataset.originalText;
  }

  window.bt38PushGovernedListing = async function(row){
    row = row || null;
    if (!row) throw new Error("No row selected");

    const listingId = row.dataset.listingId;
    if (!listingId) throw new Error("Missing listing id");

    return postJson(`/governed/actions/listings/${encodeURIComponent(listingId)}/push`, {});
  };

  window.bt38OpenRowAction = async function(button){
    const row = rowFrom(button);
    if (!row) return false;

    const listingId = row.dataset.listingId;
    const sku = row.dataset.sku || "";
    const stockId = row.dataset.stockId || "";

    try {
      if (button.classList.contains("bt38-marketplace-control")) {
        if (!listingId) {
          alert("This row has no marketplace listing id.");
          return false;
        }

        setButtonState(button, "Pushing...");
        const data = await window.bt38PushGovernedListing(row);
        setButtonState(button, "Done");
        setTimeout(() => resetButton(button), 1200);
        console.log("Governed push result", data);
        return false;
      }

      if (button.classList.contains("bt38-qty-action")) {
        if (!listingId) {
          alert("This row has no listing id to save quantity.");
          return false;
        }

        const currentText = (button.parentElement && button.parentElement.innerText || "").match(/\d+/);
        const currentQty = currentText ? currentText[0] : "0";
        const nextQty = prompt("Enter new warehouse quantity for " + sku, currentQty);

        if (nextQty === null) return false;

        setButtonState(button, "Saving...");
        const data = await postJson(`/governed/actions/listings/${encodeURIComponent(listingId)}/quantity`, {
          quantity: nextQty
        });
        setButtonState(button, "Saved");
        setTimeout(() => window.location.reload(), 700);
        console.log("Governed quantity result", data);
        return false;
      }

      if (button.classList.contains("bt38-price-action")) {
        if (!listingId) {
          alert("This row has no listing id to save price.");
          return false;
        }

        const currentText = (button.parentElement && button.parentElement.innerText || "").replace(/[^\d.]/g, "");
        const currentPrice = currentText || "0.00";
        const nextPrice = prompt("Enter new local listing price for " + sku, currentPrice);

        if (nextPrice === null) return false;

        setButtonState(button, "Saving...");
        const data = await postJson(`/governed/actions/listings/${encodeURIComponent(listingId)}/price`, {
          price: nextPrice
        });
        setButtonState(button, "Saved");
        setTimeout(() => window.location.reload(), 700);
        console.log("Governed price result", data);
        return false;
      }

      if (button.classList.contains("bt38-warehouse-action")) {
        window.location.href = `/warehouse?q=${encodeURIComponent(sku || stockId)}`;
        return false;
      }

      window.location.href = `/warehouse?q=${encodeURIComponent(sku || stockId)}`;
      return false;
    } catch (err) {
      console.error(err);
      alert(err.message || "Action failed");
      resetButton(button);
      return false;
    }
  };


</script>

<style>

.bt38-enterprise-stock{
  padding:16px 18px;

}

.bt38-stock-header{
