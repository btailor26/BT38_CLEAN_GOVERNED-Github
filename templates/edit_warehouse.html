{% extends "base.html" %}

{% block title %}Edit Warehouse - Inventory Management{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h2 class="mb-0">
                    <i data-feather="edit-2" class="me-2"></i>
                    Edit Warehouse
                </h2>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('routes.edit_warehouse', warehouse_id=warehouse.id) }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Warehouse Name *</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ warehouse.name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="location" class="form-label">Location</label>
                        <input type="text" class="form-control" id="location" name="location" value="{{ warehouse.location or '' }}">
                    </div>
                    
                    <div class="mb-3">
                        <label for="priority" class="form-label">Priority</label>
                        <input type="number" class="form-control" id="priority" name="priority" value="{{ warehouse.priority }}">
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if warehouse.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">
                            Active
                        </label>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="is_default" name="is_default" {% if warehouse.is_default %}checked{% endif %}>
                        <label class="form-check-label" for="is_default">
                            Set as Default
                        </label>
                    </div>
                    
                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3">{{ warehouse.notes or '' }}</textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('routes.warehouses') }}" class="btn btn-secondary">
                            <i data-feather="x" class="me-1"></i>
                            Cancel
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i data-feather="save" class="me-1"></i>
                            Update Warehouse
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
feather.replace();
</script>
{% endblock %}
