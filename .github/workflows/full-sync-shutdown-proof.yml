name: Full Sync Shutdown Proof

on:
  push:
    branches:
      - codex/full-sync-shutdown
      - codex/stage4-shutdown-proof-clean
      - codex/stage4-shutdown-proof-clean-v2
  pull_request:
    branches:
      - main

jobs:
  shutdown-proof:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install shutdown proof dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install Flask pytest

      - name: Show Python import path and guard import
        run: |
          python - <<'PY'
          import os, sys
          print('cwd=', os.getcwd())
          print('PYTHONPATH=', os.environ.get('PYTHONPATH'))
          print('sys.path[:5]=', sys.path[:5])

          import flask
          import shutdown_http_guard

          print('flask import OK:', flask.__version__)
          print('shutdown_http_guard import OK:', shutdown_http_guard.__file__)
          print('shutdown guard installed:', shutdown_http_guard.HTTP_GUARD_INSTALLED)

          assert shutdown_http_guard.HTTP_GUARD_INSTALLED is True
          PY

      - name: Compile shutdown branch files
        run: |
          python -m py_compile \
            app.py \
            routes.py \
            models.py \
            sync_dispatcher.py \
            queue_manager.py \
            sync_service.py \
            smart_push_service.py \
            auto_push_service.py \
            marketplace_order_processor.py \
            warehouse_push_coordinator.py \
            amazon_service.py \
            ebay_service.py \
            shutdown_http_guard.py \
            sitecustomize.py \
            services/runtime_gate.py \
            services/governed_approval.py \
            old_path_shutdown.py \
            governed_execution.py \
            marketplace_adapters/base.py \
            marketplace_adapters/amazon_fbm.py \
            marketplace_adapters/ebay.py

      - name: Run shutdown proof tests
        run: |
          python -m pytest -v \
            tests/test_shutdown_http_guard.py \
            tests/test_old_sync_paths_shutdown.py \
            tests/test_governed_execution_skeleton.py \
            tests/test_governed_sku_dry_run_route.py \
            tests/test_governed_amazon_fbm_live_path.py \
            tests/test_stage5_governed_marketplace_gate_contract.py \
            tests/test_governed_approval_object.py
