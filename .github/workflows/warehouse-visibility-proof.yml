name: Warehouse Visibility Proof

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - 'amazon_service_live_patch.py'
      - 'backend/adapters/amazon_sp_api_adapter.py'
      - 'governed_routes.py'
      - 'templates/warehouse.html'
      - '.github/workflows/warehouse-visibility-proof.yml'

jobs:
  warehouse-visibility-proof:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv sync --frozen --no-dev

      - name: Compile warehouse visibility files
        run: |
          uv run python -m py_compile \
            amazon_service_live_patch.py \
            backend/adapters/amazon_sp_api_adapter.py \
            governed_routes.py

      - name: Prove Amazon constructor uses lwa_client_id
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          adapter = Path('backend/adapters/amazon_sp_api_adapter.py').read_text(encoding='utf-8')
          live_patch = Path('amazon_service_live_patch.py').read_text(encoding='utf-8')

          assert 'lwa_client_id' in adapter, 'Amazon adapter must resolve/use lwa_client_id'
          assert 'Inventories(' in adapter, 'Amazon adapter must construct Inventories client'
          assert 'lwa_app_id=(' not in adapter, 'Amazon adapter must not call Inventories with lwa_app_id'
          assert '"lwa_client_id"' in live_patch, 'Live patch credentials must output lwa_client_id'
          print('Amazon SP-API LWA constructor alignment OK')
          PY

      - name: Prove warehouse eBay variation visibility wiring
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          route = Path('governed_routes.py').read_text(encoding='utf-8')
          template = Path('templates/warehouse.html').read_text(encoding='utf-8')

          required_route = [
              'is_ebay_variation_child',
              'parent_item_id=getattr(listing, "parent_item_id", None)',
              'external_parent_id=getattr(listing, "external_parent_id", None)',
              'variation_sku_map=getattr(listing, "variation_sku_map", None)',
              'if (is_fba or is_ebay_variation_child)',
          ]
          for needle in required_route:
              assert needle in route, f'Missing warehouse route wiring: {needle}'

          required_template = [
              'Listing ID: {{ item.external_listing_id }}',
              'Parent Item: {{ item.parent_item_id or item.external_parent_id }}',
              'eBay Variation Child',
          ]
          for needle in required_template:
              assert needle in template, f'Missing warehouse template visibility: {needle}'

          print('Warehouse eBay variation visibility wiring OK')
          PY
